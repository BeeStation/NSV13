author: DeltaFire15
delete-after: true
changes:
  - bugfix: Broadside cannon moth abuse doesn't cause runtimes if the mob isn't a
      carbon.
  - bugfix: Ships now actually drop destroyed targets they were focusing on.
  - bugfix: The thrust overlay can now display even when the side thrust overlays
      do not.
  - bugfix: Relay projectiles should no longer cause runtimes in very specific circumstances
      related to spawn async.
  - bugfix: Flak doesn't try to refire when autonomously firing, despite the fact
      it won't be able to.
